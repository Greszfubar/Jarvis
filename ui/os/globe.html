<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GLOBE</title>
<link rel="stylesheet" href="/os/static/os.css?v=2">
<style>
  #globe-view { position: fixed; inset: 0; }
  /* Inlined (not only in os.css): survive stale-cached stylesheets */
  .globe-stormlabel {
    position: absolute; top: 0; left: 0;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    text-align: center; transition: opacity .25s linear;
    text-shadow: 0 0 10px #000; will-change: transform;
  }
  .globe-stormlabel .sn { font-size: 11px; letter-spacing: 0.26em; color: #ff8a80; }
  .globe-stormlabel .st { font-size: 7px; letter-spacing: 0.3em; color: var(--dim); }
  .globe-flightlabel {
    position: absolute; top: 0; left: 0;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    text-align: center; transition: opacity .25s linear;
    text-shadow: 0 0 10px #000; will-change: transform;
  }
  .globe-flightlabel .fn { font-size: 11px; letter-spacing: 0.26em; color: #7fd4ff; }
  .globe-flightlabel .fd { font-size: 7px; letter-spacing: 0.3em; color: #f2f4f6; }
  .globe-flightlabel .fr { font-size: 7px; letter-spacing: 0.3em; color: var(--dim); }
  #stage-mode {
    position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 0.55em; text-transform: uppercase;
    color: var(--dim); padding-left: 0.55em;
    opacity: 0; transition: opacity .6s ease;
  }
  #stage-mode.on { opacity: 1 }
  #stage-footnote {
    position: fixed; bottom: 4vh; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 0.6em; text-transform: uppercase;
    color: var(--dim); padding-left: 0.6em;
  }
</style>
</head>
<body>
  <canvas id="dots"></canvas>
  <div id="globe-view"></div>
  <div id="stage-mode"></div>
  <div id="stage-footnote">GRESZ INDUSTRIES</div>

  <script type="module">
    import "/os/static/js/dots.js";
    import { Globe } from "/os/static/js/globe.js";
    import { EventLink } from "/os/static/js/ws.js";

    const modeEl = document.getElementById("stage-mode");
    const globe = new Globe(document.getElementById("globe-view"), {
      onModeChange: (m) => {
        // Reflects every mode change — including the auto-revert to clear
        modeEl.textContent = m === "clear" ? "" : `GLOBE — ${m.toUpperCase()}`;
        modeEl.classList.toggle("on", m !== "clear");
      },
    });
    await globe.init();
    window.__globe = globe;   // dev inspection

    const setMode = (m) => globe.setMode(m);

    // Dev/demo: /globe?mode=heat&fly=28.3,-16.6&hold=8
    const q = new URLSearchParams(location.search);
    if (q.get("hold")) globe.holdMs = Number(q.get("hold")) * 1000;
    if (q.get("mode")) setMode(q.get("mode"));
    if (q.get("fly")) {
      const [lat, lon] = q.get("fly").split(",").map(Number);
      if (isFinite(lat) && isFinite(lon)) setTimeout(() => globe.flyTo(lat, lon), 800);
    }

    // Voice-driven: [ACTION:os:globe|heat] / [ACTION:os:fly|lat,lon]
    new EventLink((d) => {
      if (d.kind !== "os") return;
      if (d.command === "globe" && d.arg) {
        const m = d.arg.trim().toLowerCase();
        if (["heat", "wind", "rain", "flights", "clear"].includes(m)) setMode(m);
      }
      if (d.command === "fly" && d.arg) {
        const [lat, lon, dist] = String(d.arg).split(",").map(Number);
        if (isFinite(lat) && isFinite(lon)) globe.flyTo(lat, lon, isFinite(dist) ? dist : null);
      }
    });
  </script>
</body>
</html>
